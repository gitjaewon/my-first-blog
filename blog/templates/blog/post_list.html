<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>형준의 블로그</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
        header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 a { text-decoration: none; color: #333; font-size: 1.4rem; }
        .auth-area { display: flex; gap: 0.5rem; align-items: center; }
        .auth-area input { padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.85rem; }
        button { padding: 0.4rem 0.9rem; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .btn-primary { background: #4a90e2; color: #fff; }
        .btn-primary:hover { background: #357abd; }
        .btn-danger { background: #e25555; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219150; }
        main { max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
        #new-post-form { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; border: 1px solid #e0e0e0; display: none; }
        #new-post-form h2 { margin-bottom: 1rem; font-size: 1.1rem; }
        #new-post-form input, #new-post-form textarea { width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 0.8rem; font-size: 0.95rem; }
        #new-post-form textarea { height: 150px; resize: vertical; font-family: inherit; }
        #new-post-form .form-actions { display: flex; gap: 0.5rem; }
        .post-card { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.2rem; border: 1px solid #e0e0e0; }
        .post-card h2 { font-size: 1.2rem; margin-bottom: 0.4rem; }
        .post-meta { font-size: 0.8rem; color: #888; margin-bottom: 0.8rem; }
        .post-text { line-height: 1.6; white-space: pre-wrap; }
        .post-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
        .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 20px; font-size: 0.75rem; margin-left: 0.5rem; }
        .badge-published { background: #d4edda; color: #155724; }
        .badge-draft { background: #fff3cd; color: #856404; }
        #status-msg { padding: 0.6rem 1rem; border-radius: 4px; margin-bottom: 1rem; display: none; }
        #status-msg.error { background: #fdecea; color: #c0392b; display: block; }
        #status-msg.success { background: #d4edda; color: #155724; display: block; }
        .logged-in-info { font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>
<header>
    <h1><a href="/">형준의 블로그</a></h1>
    <div class="auth-area" id="auth-area">
        <input type="text" id="username" placeholder="아이디">
        <input type="password" id="password" placeholder="비밀번호">
        <button class="btn-primary" onclick="login()">로그인</button>
    </div>
</header>

<main>
    <div id="status-msg"></div>

    <div id="new-post-form">
        <h2>새 글 작성</h2>
        <input type="text" id="post-title" placeholder="제목">
        <textarea id="post-text" placeholder="내용"></textarea>
        <div class="form-actions">
            <button class="btn-primary" onclick="createPost()">저장 (임시)</button>
            <button class="btn-success" onclick="createPost(true)">저장 & 발행</button>
        </div>
    </div>

    <div id="posts-container"></div>
</main>

<script>
    let token = localStorage.getItem('token');
    let currentUser = localStorage.getItem('username');

    function showStatus(msg, type) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        el.className = type;
        setTimeout(() => el.style.display = 'none', 3000);
    }

    function updateAuthUI() {
        const area = document.getElementById('auth-area');
        if (token) {
            area.innerHTML = `
                <span class="logged-in-info">${currentUser} 님</span>
                <button class="btn-primary" onclick="toggleNewPostForm()">새 글 작성</button>
                <button class="btn-danger" onclick="logout()">로그아웃</button>
            `;
        } else {
            area.innerHTML = `
                <input type="text" id="username" placeholder="아이디">
                <input type="password" id="password" placeholder="비밀번호">
                <button class="btn-primary" onclick="login()">로그인</button>
            `;
        }
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const res = await fetch('/api-token-auth/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        if (res.ok) {
            const data = await res.json();
            token = data.token;
            currentUser = username;
            localStorage.setItem('token', token);
            localStorage.setItem('username', username);
            updateAuthUI();
            showStatus('로그인 성공', 'success');
        } else {
            showStatus('아이디 또는 비밀번호가 틀렸습니다', 'error');
        }
    }

    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('token');
        localStorage.removeItem('username');
        document.getElementById('new-post-form').style.display = 'none';
        updateAuthUI();
        loadPosts();
    }

    function toggleNewPostForm() {
        const form = document.getElementById('new-post-form');
        form.style.display = form.style.display === 'none' ? 'block' : 'none';
    }

    async function createPost(publish = false) {
        const title = document.getElementById('post-title').value.trim();
        const text = document.getElementById('post-text').value.trim();
        if (!title || !text) { showStatus('제목과 내용을 입력하세요', 'error'); return; }

        const res = await fetch('/api/posts/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Token ${token}` },
            body: JSON.stringify({ title, text })
        });
        if (res.ok) {
            const post = await res.json();
            if (publish) await publishPost(post.id);
            document.getElementById('post-title').value = '';
            document.getElementById('post-text').value = '';
            document.getElementById('new-post-form').style.display = 'none';
            showStatus('글이 저장되었습니다', 'success');
            loadPosts();
        } else {
            showStatus('글 저장 실패', 'error');
        }
    }

    async function publishPost(id) {
        await fetch(`/api/posts/${id}/publish/`, {
            method: 'POST',
            headers: { 'Authorization': `Token ${token}` }
        });
        loadPosts();
    }

    async function deletePost(id) {
        if (!confirm('삭제하시겠습니까?')) return;
        await fetch(`/api/posts/${id}/`, {
            method: 'DELETE',
            headers: { 'Authorization': `Token ${token}` }
        });
        loadPosts();
    }

    async function loadPosts() {
        const res = await fetch('/api/posts/');
        const posts = await res.json();
        const container = document.getElementById('posts-container');
        if (!posts.length) { container.innerHTML = '<p style="color:#888">아직 글이 없습니다.</p>'; return; }
        container.innerHTML = posts.map(post => `
            <div class="post-card">
                <h2>${escHtml(post.title)}
                    <span class="badge ${post.published_date ? 'badge-published' : 'badge-draft'}">
                        ${post.published_date ? '발행됨' : '임시저장'}
                    </span>
                </h2>
                <div class="post-meta">${post.author} · ${formatDate(post.created_date)}</div>
                <div class="post-text">${escHtml(post.text)}</div>
                ${token ? `
                <div class="post-actions">
                    ${!post.published_date ? `<button class="btn-success" onclick="publishPost(${post.id})">발행</button>` : ''}
                    <button class="btn-danger" onclick="deletePost(${post.id})">삭제</button>
                </div>` : ''}
            </div>
        `).join('');
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(iso) {
        return new Date(iso).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
    }

    updateAuthUI();
    loadPosts();
</script>
</body>
</html>
